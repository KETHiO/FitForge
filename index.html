<!DOCTYPE html>
<html>

<head>
<title>FitForge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏋️ FitForge</h1>

<div id="dashboardPage">

<div class="dashboard">

<h2>Daily Calories</h2>

<div class="ringContainer">

<svg width="160" height="160">

<circle cx="80" cy="80" r="70" stroke="#eee" stroke-width="12" fill="none"/>

<circle id="progressRing"
cx="80"
cy="80"
r="70"
stroke="#00c6ff"
stroke-width="12"
fill="none"
stroke-dasharray="440"
stroke-dashoffset="440"/>

</svg>

<div class="ringText">
<p id="consumed">0</p>
<span>cal</span>
</div>

</div>

<p>Goal: <span id="goal">2200</span></p>
<p>Remaining: <span id="remaining">2200</span></p>

</div>

</div>



<div id="foodPage" style="display:none">

<h2>Add Food</h2>

<input id="foodName" placeholder="Food name">
<input id="foodCalories" placeholder="Calories">
<input id="foodProtein" placeholder="Protein (g)">
<input id="foodCarbs" placeholder="Carbs (g)">
<input id="foodFat" placeholder="Fat (g)">

<button onclick="addFood()">Add Food</button>

<ul id="foodList"></ul>

</div>



<div id="workoutPage" style="display:none">

<h2>Workout Builder</h2>

<select id="muscleSelect">

<option value="chest">Chest</option>
<option value="back">Back</option>
<option value="legs">Legs</option>
<option value="shoulders">Shoulders</option>
<option value="arms">Arms</option>

</select>

<button onclick="generateWorkout()">Generate Workout</button>

<ul id="generatedWorkout"></ul>

</div>



<div id="exerciseDemo" class="demoPanel" style="display:none">

<h2 id="demoTitle"></h2>

<video id="demoVideo" controls width="100%"></video>

<p id="demoMuscle"></p>

<p id="demoInstructions"></p>

<button onclick="closeDemo()">Close</button>

</div>



<div id="profilePage" style="display:none">

<h2>Profile</h2>

<p id="usernameDisplay"></p>

<button onclick="logout()">Logout</button>

</div>



<div class="navBar">

<button onclick="showPage('dashboardPage')">🏠<br>Home</button>
<button onclick="showPage('foodPage')">🍎<br>Food</button>
<button onclick="showPage('workoutPage')">💪<br>Workout</button>
<button onclick="showPage('profilePage')">👤<br>Profile</button>

</div>

<script src="app.js"></script>

</body>

</html>
