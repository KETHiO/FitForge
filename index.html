<!DOCTYPE html>
<html>

<head>

<title>FitForge</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0072ff">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

</head>

<body>

<h1>🏋️ FitForge</h1>

<button onclick="logout()">Logout</button>

<!-- DASHBOARD -->

<div id="dashboardPage">

<div class="dashboard">

<h2>Daily Calories</h2>

<div class="ringContainer">

<svg width="160" height="160">

<circle cx="80" cy="80" r="70" stroke="#eee" stroke-width="12" fill="none"/>

<circle id="progressRing"
cx="80"
cy="80"
r="70"
stroke="#00c6ff"
stroke-width="12"
fill="none"
stroke-dasharray="440"
stroke-dashoffset="440"/>

</svg>

<div class="ringText">
<p id="consumed">0</p>
<span>cal</span>
</div>

</div>

</div>

</div>



<!-- FOOD PAGE -->

<div id="foodPage" style="display:none">

<h2>Add Food</h2>

<input id="foodName" placeholder="Food name">
<input id="foodCalories" placeholder="Calories">

<button onclick="addFood()">Add Food</button>

<button onclick="startScanner()">📷 Scan Barcode</button>

<div id="scanner"></div>

<ul id="foodList"></ul>

</div>



<!-- WORKOUT PAGE -->

<div id="workoutPage" style="display:none">

<h2>Muscle Trainer</h2>

<button onclick="showFront()">Front</button>
<button onclick="showBack()">Back</button>

<div class="bodyDiagram">

<svg id="frontBody" viewBox="0 0 200 400" width="200">

<rect x="80" y="40" width="40" height="60" fill="#444"/>
<rect x="60" y="100" width="80" height="120" fill="#444"/>
<rect x="70" y="220" width="20" height="120" fill="#444"/>
<rect x="110" y="220" width="20" height="120" fill="#444"/>

<rect id="chest" class="muscle" x="65" y="110" width="70" height="40"/>
<rect id="shoulders" class="muscle" x="50" y="90" width="100" height="25"/>
<rect id="arms" class="muscle" x="45" y="120" width="110" height="60"/>
<rect id="legs" class="muscle" x="70" y="240" width="60" height="100"/>

</svg>

<svg id="backBody" viewBox="0 0 200 400" width="200" style="display:none">

<rect x="80" y="40" width="40" height="60" fill="#444"/>
<rect x="60" y="100" width="80" height="120" fill="#444"/>
<rect x="70" y="220" width="20" height="120" fill="#444"/>
<rect x="110" y="220" width="20" height="120" fill="#444"/>

<rect id="back" class="muscle" x="65" y="110" width="70" height="60"/>
<rect id="glutes" class="muscle" x="65" y="180" width="70" height="40"/>
<rect id="hamstrings" class="muscle" x="70" y="240" width="60" height="80"/>

</svg>

</div>

<h2>Workout Generator</h2>

<select id="muscleSelect">

<option value="chest">Chest</option>
<option value="back">Back</option>
<option value="legs">Legs</option>
<option value="shoulders">Shoulders</option>
<option value="arms">Arms</option>

</select>

<button onclick="generateWorkout()">Generate Workout</button>
<button onclick="startWorkout()">Start Workout</button>

<ul id="generatedWorkout"></ul>

</div>



<!-- SESSION PAGE -->

<div id="sessionPage" style="display:none">

<h2 id="sessionExercise"></h2>

<p>Sets Completed: <span id="setCounter">0</span>/3</p>

<button onclick="completeSet()">Complete Set</button>

<h3 id="timer">60</h3>

<button onclick="startTimer()">Start Rest</button>

<button onclick="nextExercise()">Next Exercise</button>

</div>



<!-- NAV -->

<div class="navBar">

<button onclick="showPage('dashboardPage')">🏠 Home</button>
<button onclick="showPage('foodPage')">🍎 Food</button>
<button onclick="showPage('workoutPage')">💪 Workout</button>

</div>

<script src="app.js"></script>

</body>
</html>
