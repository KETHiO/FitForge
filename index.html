<!DOCTYPE html>
<html>

<head>
<title>FitForge</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>

<body>

<h1>FitForge</h1>

<div id="dashboardPage">

<div class="dashboard">

<h2>Daily Calories</h2>

<div class="ringContainer">

<svg width="160" height="160">

<circle cx="80" cy="80" r="70" stroke="#eee" stroke-width="12" fill="none"/>

<circle id="progressRing"
cx="80"
cy="80"
r="70"
stroke="#28a745"
stroke-width="12"
fill="none"
stroke-dasharray="440"
stroke-dashoffset="440"/>

</svg>

<div class="ringText">
<p id="consumed">0</p>
<span>cal</span>
</div>

</div>

<p>Goal: <span id="goal">2200</span></p>

<p>Remaining: <span id="remaining">2200</span></p>

<h3>Macros</h3>

<p>Protein: <span id="proteinTotal">0</span> g</p>
<p>Carbs: <span id="carbsTotal">0</span> g</p>
<p>Fat: <span id="fatTotal">0</span> g</p>

</div>

</div>

<div id="foodPage" style="display:none">

<h2>Add Food</h2>

<input id="foodName" placeholder="Food name">
<input id="foodCalories" placeholder="Calories">
<input id="foodProtein" placeholder="Protein (g)">
<input id="foodCarbs" placeholder="Carbs (g)">
<input id="foodFat" placeholder="Fat (g)">

<button onclick="addFood()">Add Food</button>

<button onclick="startScanner()">📷 Scan Barcode</button>

<div id="scanner"></div>

<ul id="foodList"></ul>

</div>

<div id="workoutPage" style="display:none">

<h2>Workout Log</h2>

<input id="exerciseName" placeholder="Exercise">
<input id="sets" placeholder="Sets">
<input id="reps" placeholder="Reps">

<button onclick="addWorkout()">Add Workout</button>

<ul id="workoutList"></ul>

</div>

<div id="profilePage" style="display:none">

<h2>Profile</h2>

<p id="usernameDisplay"></p>

<button onclick="logout()">Logout</button>

</div>

<div class="navBar">

<button onclick="showPage('dashboardPage')">🏠<br>Home</button>

<button onclick="showPage('foodPage')">🍎<br>Food</button>

<button onclick="showPage('workoutPage')">💪<br>Workouts</button>

<button onclick="showPage('profilePage')">👤<br>Profile</button>

</div>

<script src="app.js"></script>

</body>
</html>
